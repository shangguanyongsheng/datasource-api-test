[pytest]
# 测试目录
testpaths = tests

# 测试文件匹配
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# 命令行参数
addopts =
    -v
    --tb=short
    --html=reports/html/report.html
    --self-contained-html
    -p no:warnings

# 日志配置
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# 标记
markers =
    basic: 基础场景测试
    combine: 组合场景测试
    boundary: 边界场景测试
    pagination: 分页场景测试
    no_pagination: 不分页场景测试
    special: 特殊场景测试
    slow: 慢速测试