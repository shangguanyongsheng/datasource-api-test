# 环境配置
environment:
  name: "测试环境"
  base_url: "http://localhost:8080"
  # timeout 支持两种格式：
  # - int: 连接和读取超时相同，如 timeout: 30 表示都是 30 秒
  # - [connect, read]: 分别设置，如 [10, 60] 表示连接超时 10 秒，读取超时 60 秒
  # 推荐使用 [10, 60]，给数据查询更多时间
  timeout: [10, 60]

# 认证配置
auth:
  tenant_id: "tenant_001"
  user_id: 1001
  token: ""  # 如需要可配置

# 当前测试的数据源ID（只运行这一个）
current_widget_id: 76

# 数据库配置（用于数据校验）
database:
  enabled: false  # 是否启用数据库验证
  host: "localhost"
  port: 3306
  database: "cfs_report"
  user: "root"
  password: "password"

# 报告配置
report:
  output_dir: "reports/html"
  title: "数据源查询接口测试报告"